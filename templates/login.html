{% extends "base.html" %}
{% block title %}Masuk — Web Kuis AI{% endblock %}
{% block content %}
<div class="auth-wrapper">
  <div class="auth-card">
    <h2>👋 Masuk</h2>
    <form id="loginForm">
      <div class="form-group">
        <label for="loginUsername">Username</label>
        <input id="loginUsername" name="username" type="text" required placeholder="username kamu"/>
      </div>
      <div class="form-group">
        <label for="loginPassword">Password</label>
        <input id="loginPassword" name="password" type="password" required placeholder="••••••••"/>
      </div>
      <button class="btn-primary" type="submit" style="width:100%;margin-top:8px">Masuk</button>
    </form>
    <div id="loginMsg" class="form-msg"></div>
    <p class="auth-link">Belum punya akun? <a href="/register">Daftar sekarang</a></p>
  </div>
</div>
{% endblock %}
