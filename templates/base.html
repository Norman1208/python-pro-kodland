<!doctype html>
<html>
<head>
  <meta charset="utf-8"/>
  <title>{% block title %}Web Kuis AI{% endblock %}</title>
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <link rel="stylesheet" href="{{ url_for('static', filename='styles.css') }}">
</head>
<body>
  <header>
    <nav class="nav">
      <a href="{{ url_for('index') }}">Beranda</a>
      {% if current_user.is_authenticated %}
        <a href="{{ url_for('quiz_page') }}">Kuis</a>
        <a href="{{ url_for('leaderboard_page') }}">Papan Peringkat</a>
        <button id="logoutBtn">Logout</button>
        <span class="user">Hi, {{ current_user.display_name }}</span>
      {% else %}
        <a href="{{ url_for('register') }}">Daftar</a>
        <a href="{{ url_for('login') }}">Masuk</a>
        <a href="{{ url_for('leaderboard_page') }}">Papan Peringkat</a>
      {% endif %}
    </nav>
  </header>

  <main>
    {% block content %}{% endblock %}
  </main>

  <footer>
    <p>Pengembang: Nama Anda — Web Kuis AI untuk Remaja</p>
  </footer>

  <script src="{{ url_for('static', filename='main.js') }}"></script>
  {% block scripts %}{% endblock %}
</body>
</html>
