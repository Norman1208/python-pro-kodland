<!doctype html>
<html lang="id">
<head>
  <meta charset="utf-8"/>
  <title>{% block title %}Web Kuis AI{% endblock %}</title>
  <meta name="viewport" content="width=device-width, initial-scale=1"/>
  <meta name="description" content="Platform kuis interaktif bertopik AI, Computer Vision, NLP, Discord.py, dan Flask untuk remaja."/>
  <link rel="preconnect" href="https://fonts.googleapis.com"/>
  <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap"/>
  <link rel="stylesheet" href="{{ url_for('static', filename='styles.css') }}"/>
</head>
<body>

  <!-- ===== NAVIGATION ===== -->
  <header class="site-header">
    <nav class="nav-inner">
      <a class="brand" href="{{ url_for('index') }}">🤖 Web Kuis AI</a>

      <div class="nav-links">
        {% if current_user.is_authenticated %}
          <a href="{{ url_for('quiz_page') }}">Kuis</a>
          <a href="{{ url_for('detect_page') }}">Deteksi Gambar</a>
          <span class="nav-user">👤 {{ current_user.display_name }}</span>
          <button id="logoutBtn" class="btn-small">Keluar</button>
        {% else %}
          <a href="{{ url_for('register') }}">Daftar</a>
          <a href="{{ url_for('login') }}">Masuk</a>
        {% endif %}
      </div>
    </nav>
  </header>

  <!-- ===== SCORE WIDGET (pojok kanan atas) ===== -->
  <div id="scoreWidget" class="score-widget">
    <div class="score-item">
      <span class="score-label">🏆 Skor Global</span>
      <span class="score-value" id="globalBest">—</span>
    </div>
    <div class="score-divider"></div>
    <div class="score-item">
      <span class="score-label">👤 Skor Saya</span>
      <span class="score-value" id="userBest">—</span>
    </div>
  </div>

  <!-- ===== MAIN CONTENT ===== -->
  <main class="site-main">
    {% block content %}{% endblock %}
  </main>

  <!-- ===== FOOTER ===== -->
  <footer class="site-footer">
    <p>Pengembang: <strong>Norman</strong> &mdash; Web Kuis AI untuk Remaja &copy; 2025</p>
  </footer>

  <script src="{{ url_for('static', filename='main.js') }}"></script>
  {% block scripts %}{% endblock %}
</body>
</html>
